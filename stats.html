<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Statistik · Walking with Wieland</title>
  <meta name="theme-color" content="#042615">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wieland">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-180.png">
  <link rel="icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="css/style.css?v=33">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="screen screen--nav screen--stats">
    <!-- Titel direkt auf Hintergrund, keine Card -->
    <div class="stats-header">
      <h1 class="stats-title" id="st-title">Statistik</h1>
      <p class="stats-subtitle">Deine Spaziergänge der letzten Wochen.</p>
    </div>

    <!-- Tagesspalten: immer sichtbar, außerhalb des Scrollbereichs -->
    <div class="stat-head" aria-hidden="true">
      <span></span>
      <span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span><span>Sa</span><span>So</span>
    </div>

    <!-- Scrollbarer Bereich: älteste Woche oben, aktuellste unten -->
    <div class="stat-scroll" id="stat-scroll">
      <div class="stat-weeks" id="weeks"></div>
    </div>

    <!-- Legende auf dunklem Hintergrund, 2 Spalten -->
    <div class="stat-legend-bar">
      <div class="stat-legend">
        <div class="legend-col">
          <span class="legend-item"><span class="legend-swatch"></span>Kein Spaziergang</span>
          <span class="legend-item"><span class="legend-swatch is-guided"></span>Angeleitete Strecke</span>
        </div>
        <div class="legend-col">
          <span class="legend-item"><span class="legend-swatch is-free"></span>Freies Laufen</span>
          <span class="legend-item"><span class="legend-swatch is-both"></span>Beide</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Tages-Detail-Panel -->
  <div class="map-panel" id="day-panel" hidden>
    <div class="map-panel__bar">
      <strong id="day-panel-title"></strong>
      <button class="icon-btn" id="day-panel-close" type="button" aria-label="Schließen"></button>
    </div>
    <div class="day-panel__body" id="day-panel-body"></div>
  </div>

  <!-- Routen-Karte -->
  <div class="map-panel" id="route-map-panel" hidden>
    <div class="map-panel__bar">
      <strong>Gelaufene Strecke</strong>
      <button class="icon-btn" id="route-map-close" type="button" aria-label="Schließen"></button>
    </div>
    <div id="route-map"></div>
  </div>

  <script src="js/exercises.js?v=10"></script>
  <script src="js/trophies.js?v=10"></script>
  <script src="js/app.js?v=17"></script>
  <script src="js/photoStore.js?v=1"></script>
  <script src="js/camera.js?v=1"></script>
  <script src="js/stats.js?v=15"></script>
</body>
</html>
